name: Neiron
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    watchOS: "10.0"
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: X63G3W3XHB
    CODE_SIGN_STYLE: Automatic

schemes:
  Neiron:
    build:
      targets:
        NeironiOS: all
        NeironWatch: all
        NeironWidgets: all
    archive:
      config: Release

targets:
  NeironiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NeironiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.neiron
        INFOPLIST_FILE: NeironiOS/Info.plist
        SKIP_INSTALL: "NO"
        INSTALL_PATH: "/Applications"
    entitlements:
      path: NeironiOS/NeironiOS.entitlements

  NeironWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: NeironWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.neiron.watchkitapp
        INFOPLIST_FILE: NeironWatch/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: "YES"
    entitlements:
      path: NeironWatch/Resources/NeironWatch.entitlements
    dependencies:
      - target: NeironWidgets
        embed: true

  NeironWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: NeironWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.neiron.watchkitapp.widgets
        INFOPLIST_FILE: NeironWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: "YES"
