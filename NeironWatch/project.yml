name: Neiron
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    watchOS: "10.0"
    iOS: "17.0"
  xcodeVersion: "15.2"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}

targets:

  # ── iOS Companion App ──────────────────────────────
  NeironiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NeironiOS
        group: NeironiOS
    info:
      path: NeironiOS/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.neiron
        INFOPLIST_FILE: NeironiOS/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: NeironiOS/NeironiOS.entitlements

  # ── watchOS App ────────────────────────────────────
  NeironWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: NeironWatch
        group: NeironWatch
    info:
      path: NeironWatch/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.neiron.watchkitapp
        INFOPLIST_FILE: NeironWatch/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: NeironWatch/Resources/NeironWatch.entitlements
    dependencies:
      - target: NeironWidgets
        embed: true

  # ── Widget Extension ───────────────────────────────
  NeironWidgets:
    type: appExtension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: NeironWidgets
        group: NeironWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.neiron.watchkitapp.widgets
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: NeironWidgets
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
