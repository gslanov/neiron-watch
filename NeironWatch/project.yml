name: Neiron
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    watchOS: "10.0"
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
  configs:
    Release:
      CODE_SIGN_IDENTITY: "Apple Distribution: George Slanov (X63G3W3XH8)"

schemes:
  NeironWatch:
    build:
      targets:
        NeironWatch: all
    archive:
      config: Release

targets:

  NeironiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NeironiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.neiron
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: NeironiOS/Info.plist
    entitlements:
      path: NeironiOS/NeironiOS.entitlements

  NeironWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: NeironWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.neiron.watchkitapp
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Distribution: George Slanov (X63G3W3XH8)"
        INFOPLIST_FILE: NeironWatch/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: NeironWatch/Resources/NeironWatch.entitlements
    dependencies:
      - target: NeironWidgets
        embed: true

  NeironWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: NeironWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.neiron.watchkitapp.widgets
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Distribution: George Slanov (X63G3W3XH8)"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: NeironWidgets
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
