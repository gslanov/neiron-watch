name: Build watchOS & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  XCODEGEN_VERSION: "2.42.0"
  SCHEME_WATCH: "NeironWatch"
  SCHEME_IOS: "NeironiOS"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode ───────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      # ── 3. Install XcodeGen ────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 4. Generate Xcode project ─────────────────
      - name: Generate .xcodeproj
        working-directory: NeironWatch
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: xcodegen generate

      # ── 5. Install Apple certificate & profile ────
      - name: Install Apple certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profiles
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: "com.openclaw.neiron*"
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      # ── 6. Build watchOS app ──────────────────────
      - name: Build watchOS app
        working-directory: NeironWatch
        run: |
          xcodebuild \
            -project Neiron.xcodeproj \
            -scheme NeironWatch \
            -destination 'generic/platform=watchOS' \
            -configuration Release \
            -archivePath $RUNNER_TEMP/NeironWatch.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      # ── 7. Export .ipa ────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>upload</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NeironWatch.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      # ── 8. Upload to TestFlight ───────────────────
      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type watchos \
            --file "$RUNNER_TEMP/export/NeironWatch.ipa" \
            --apiKey ${{ secrets.APPSTORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }}

      # ── 9. Notify ─────────────────────────────────
      - name: Build complete
        if: success()
        run: echo "watchOS build uploaded to TestFlight successfully"
