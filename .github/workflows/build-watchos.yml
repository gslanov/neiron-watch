name: Build watchOS & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install watchOS platform
        run: |
          # Check if watchOS SDK already present
          xcodebuild -showsdks 2>&1 | grep -i watch && echo "watchOS SDK found" && exit 0
          # Try downloading
          echo "Downloading watchOS platform..."
          xcodebuild -downloadPlatform watchOS 2>&1 || true
          sudo xcodebuild -downloadPlatform watchOS 2>&1 || true
          # Verify
          xcodebuild -showsdks 2>&1 | grep -i watch || echo "WARNING: watchOS SDK not available"
          xcodebuild -showsdks

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        working-directory: NeironWatch
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: xcodegen generate

      # ── Install certificate into keychain ──────────
      - name: Install signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          security default-keychain -s $KEYCHAIN_PATH
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      # ── Setup API key for provisioning ─────────────
      - name: Setup API Key
        run: |
          mkdir -p $RUNNER_TEMP/private_keys
          cat > $RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 << 'KEYEOF'
          ${{ secrets.APPSTORE_PRIVATE_KEY }}
          KEYEOF
          echo "API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8" >> $GITHUB_ENV

      # ── Debug & Build ──────────────────────────────
      - name: Debug Xcode project
        working-directory: NeironWatch
        run: |
          echo "=== Checking Xcode setup ==="
          xcodebuild -version
          xcodebuild -showsdks | grep -i "watch\|ios"
          echo "=== Listing schemes in Neiron.xcodeproj ==="
          xcodebuild -project Neiron.xcodeproj -list
          echo "=== Checking build settings ==="
          xcodebuild -project Neiron.xcodeproj -scheme NeironWatch -showBuildSettings | head -50

      - name: Build archive (xcodebuild)
        working-directory: NeironWatch
        run: |
          xcodebuild archive \
            -project Neiron.xcodeproj \
            -scheme NeironWatch \
            -archivePath /tmp/Neiron.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" 2>&1 | tee /tmp/xcodebuild.log

          echo "=== Build result ==="
          tail -100 /tmp/xcodebuild.log

      - name: Create ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Export and upload to TestFlight
        run: |
          API_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"
          echo "Using API key: $API_KEY_PATH"
          ls -la "$API_KEY_PATH" 2>/dev/null || echo "ERROR: API key not found!"

          xcodebuild -exportArchive \
            -archivePath /tmp/Neiron.xcarchive \
            -exportPath /tmp/export \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APPSTORE_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_ISSUER_ID }}" 2>&1 | tee /tmp/export.log

          echo "=== Export result ==="
          tail -50 /tmp/export.log

      # ── Cleanup ────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -rf $RUNNER_TEMP/private_keys $RUNNER_TEMP/cert.p12
