name: Build watchOS & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_KEY_PATH: /Users/runner/.appstoreconnect/private_keys

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode ───────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      # ── 3. Install XcodeGen ────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 4. Setup App Store Connect API Key ─────────
      - name: Setup API Key
        run: |
          mkdir -p ${{ env.API_KEY_PATH }}
          echo '${{ secrets.APPSTORE_PRIVATE_KEY }}' > ${{ env.API_KEY_PATH }}/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          echo "Key file created:"
          ls -la ${{ env.API_KEY_PATH }}/
          echo "Key file starts with:"
          head -1 ${{ env.API_KEY_PATH }}/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      # ── 5. Generate Xcode project ─────────────────
      - name: Generate .xcodeproj
        working-directory: NeironWatch
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: xcodegen generate

      # ── 6. Build watchOS app ──────────────────────
      - name: Build watchOS app
        working-directory: NeironWatch
        run: |
          xcodebuild \
            -project Neiron.xcodeproj \
            -scheme NeironWatch \
            -destination 'generic/platform=watchOS' \
            -configuration Release \
            -archivePath $RUNNER_TEMP/NeironWatch.xcarchive \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ${{ env.API_KEY_PATH }}/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      # ── 7. Export .ipa ────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>upload</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NeironWatch.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ${{ env.API_KEY_PATH }}/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}

      # ── 8. Upload to TestFlight ───────────────────
      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type watchos \
            --file "$RUNNER_TEMP/export/NeironWatch.ipa" \
            --apiKey ${{ secrets.APPSTORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }}

      # ── 9. Cleanup ────────────────────────────────
      - name: Cleanup keys
        if: always()
        run: rm -rf ${{ env.API_KEY_PATH }}

      # ── 10. Done ───────────────────────────────────
      - name: Build complete
        if: success()
        run: echo "watchOS build uploaded to TestFlight!"
