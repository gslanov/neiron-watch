name: Build watchOS & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install watchOS platform
        run: |
          # Check if watchOS SDK already present
          xcodebuild -showsdks 2>&1 | grep -i watch && echo "watchOS SDK found" && exit 0
          # Try downloading
          echo "Downloading watchOS platform..."
          xcodebuild -downloadPlatform watchOS 2>&1 || true
          sudo xcodebuild -downloadPlatform watchOS 2>&1 || true
          # Verify
          xcodebuild -showsdks 2>&1 | grep -i watch || echo "WARNING: watchOS SDK not available"
          xcodebuild -showsdks

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        working-directory: NeironWatch
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: xcodegen generate

      # ── Install certificate into keychain ──────────
      - name: Install signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          security default-keychain -s $KEYCHAIN_PATH
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      # ── Setup API key for provisioning ─────────────
      - name: Setup API Key
        run: |
          mkdir -p $RUNNER_TEMP/private_keys
          cat > $RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 << 'KEYEOF'
          ${{ secrets.APPSTORE_PRIVATE_KEY }}
          KEYEOF
          echo "API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8" >> $GITHUB_ENV

      # ── Install fastlane ───────────────────────────
      - name: Install fastlane
        run: gem install fastlane --no-document

      # ── Create Fastlane config ─────────────────────
      - name: Setup Fastlane
        working-directory: NeironWatch
        run: |
          mkdir -p fastlane
          cat > fastlane/Fastfile << 'FASTLANE'
          default_platform(:ios)

          platform :ios do
            desc "Build watchOS and upload to TestFlight"
            lane :release do
              api_key = app_store_connect_api_key(
                key_id: ENV["ASC_KEY_ID"],
                issuer_id: ENV["ASC_ISSUER_ID"],
                key_filepath: ENV["API_KEY_PATH"]
              )

              # Download and install provisioning profiles via sigh
              watch_uuid = get_provisioning_profile(
                api_key: api_key,
                app_identifier: "com.openclaw.neiron.watchkitapp",
                platform: "ios",
                output_path: "/tmp/profiles"
              )
              watch_profile_uuid = lane_context[SharedValues::SIGH_UDID]
              watch_profile_name = lane_context[SharedValues::SIGH_NAME]
              UI.message("Watch profile: #{watch_profile_name} (#{watch_profile_uuid})")

              widget_uuid = get_provisioning_profile(
                api_key: api_key,
                app_identifier: "com.openclaw.neiron.watchkitapp.widgets",
                platform: "ios",
                output_path: "/tmp/profiles"
              )
              widget_profile_uuid = lane_context[SharedValues::SIGH_UDID]
              widget_profile_name = lane_context[SharedValues::SIGH_NAME]
              UI.message("Widget profile: #{widget_profile_name} (#{widget_profile_uuid})")

              # Extract missing certificate from profile and import to keychain
              UI.message("Extracting certificate from provisioning profile...")
              profile_data = `security cms -D -i /tmp/profiles/AppStore_com.openclaw.neiron.watchkitapp.mobileprovision`
              cert_match = profile_data.match(/<key>DeveloperCertificates<\/key>\s*<array>\s*<data>\s*(.*?)\s*<\/data>/m)
              if cert_match
                require 'base64'
                File.open("/tmp/cert.cer", "wb") { |f| f.write(Base64.decode64(cert_match[1])) }
                sh("security import /tmp/cert.cer -k \"#{ENV['KEYCHAIN_PATH']}\" -A || true")
                sh("security set-key-partition-list -S apple-tool:,apple: -k \"#{ENV['KEYCHAIN_PASSWORD']}\" \"#{ENV['KEYCHAIN_PATH']}\"")
                UI.message("Successfully extracted and imported certificate!")
              else
                UI.error("Failed to find DeveloperCertificates in profile!")
              end

              # Set manual signing per-target with profile UUID in pbxproj
              update_code_signing_settings(
                path: "Neiron.xcodeproj",
                targets: ["NeironWatch"],
                use_automatic_signing: false,
                team_id: ENV["TEAM_ID"],
                code_sign_identity: "Apple Distribution: George Slanov (X63G3W3XH8)",
                profile_uuid: watch_profile_uuid
              )
              update_code_signing_settings(
                path: "Neiron.xcodeproj",
                targets: ["NeironWidgets"],
                use_automatic_signing: false,
                team_id: ENV["TEAM_ID"],
                code_sign_identity: "Apple Distribution: George Slanov (X63G3W3XH8)",
                profile_uuid: widget_profile_uuid
              )

              project_path = File.expand_path("../Neiron.xcodeproj", __dir__)
              archive_path = "/tmp/NeironWatch.xcarchive"
              export_path = "/tmp/export"

              UI.message("Project path: #{project_path}")

              UI.message("Archiving project...")
              sh(
                "xcodebuild",
                "archive",
                "-project", project_path,
                "-scheme", "NeironWatch",
                "-sdk", "watchos",
                "-archivePath", archive_path
              )

              UI.message("Creating ExportOptions.plist...")
              export_plist_path = "/tmp/ExportOptions.plist"
              File.write(export_plist_path, <<~PLIST)
                <?xml version="1.0" encoding="UTF-8"?>
                <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                <plist version="1.0">
                <dict>
                  <key>method</key>
                  <string>app-store</string>
                  <key>teamID</key>
                  <string>#{ENV['TEAM_ID']}</string>
                  <key>signingStyle</key>
                  <string>manual</string>
                  <key>provisioningProfiles</key>
                  <dict>
                    <key>com.openclaw.neiron.watchkitapp</key>
                    <string>#{watch_profile_uuid}</string>
                    <key>com.openclaw.neiron.watchkitapp.widgets</key>
                    <string>#{widget_profile_uuid}</string>
                  </dict>
                </dict>
                </plist>
              PLIST

              UI.message("Exporting Archive...")
              sh(
                "xcodebuild",
                "-exportArchive",
                "-archivePath", archive_path,
                "-exportPath", export_path,
                "-exportOptionsPlist", export_plist_path
              )

              ipa_path = Dir[File.join(export_path, "*.ipa")].first
              UI.message("Found IPA at: #{ipa_path}")

              upload_to_testflight(
                api_key: api_key,
                ipa: ipa_path,
                skip_waiting_for_build_processing: true
              )
            end
          end
          FASTLANE

      # ── Build & Upload ─────────────────────────────
      - name: Build and upload to TestFlight
        working-directory: NeironWatch
        env:
          ASC_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: fastlane ios release

      # ── Cleanup ────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -rf $RUNNER_TEMP/private_keys $RUNNER_TEMP/cert.p12
