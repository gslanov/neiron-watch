name: Build watchOS & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode ───────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      # ── 3. Install XcodeGen ────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 4. Setup signing ───────────────────────────
      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temp keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Add to search list
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

          echo "Certificate installed successfully"

      - name: Setup API Key
        run: |
          mkdir -p $RUNNER_TEMP/private_keys
          echo '${{ secrets.APPSTORE_PRIVATE_KEY }}' > $RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          echo "API key at: $RUNNER_TEMP/private_keys/"
          ls -la $RUNNER_TEMP/private_keys/

      # ── 5. Generate Xcode project ─────────────────
      - name: Generate .xcodeproj
        working-directory: NeironWatch
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: xcodegen generate

      # ── 6. Build watchOS app ──────────────────────
      - name: Build watchOS app
        working-directory: NeironWatch
        run: |
          xcodebuild \
            -project Neiron.xcodeproj \
            -scheme NeironWatch \
            -destination 'generic/platform=watchOS' \
            -configuration Release \
            -archivePath $RUNNER_TEMP/NeironWatch.xcarchive \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      # ── 7. Export .ipa ────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>upload</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NeironWatch.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}

      # ── 8. Upload to TestFlight ───────────────────
      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type watchos \
            --file "$RUNNER_TEMP/export/"*.ipa \
            --apiKey ${{ secrets.APPSTORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }}

      # ── 9. Cleanup ────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -rf $RUNNER_TEMP/private_keys
          rm -f $RUNNER_TEMP/cert.p12

      # ── 10. Done ───────────────────────────────────
      - name: Build complete
        if: success()
        run: echo "watchOS build uploaded to TestFlight!"
